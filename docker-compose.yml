version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rfpilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rfpilot
      POSTGRES_USER: rfpilot
      POSTGRES_PASSWORD: rfpilot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rfpilot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    container_name: rfpilot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  tika:
    image: apache/tika:2.9.0
    container_name: rfpilot_tika
    restart: unless-stopped
    ports:
      - "9998:9998"

  prometheus:
    image: prom/prometheus:latest
    container_name: rfpilot_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: rfpilot_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfpilot_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      TIKA_URL: http://tika:9998
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rfpilot_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      TIKA_URL: http://tika:9998
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
